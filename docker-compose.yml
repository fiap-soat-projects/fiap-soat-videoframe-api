services:
  videoframe-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videoframe-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - S3BucketBaseUrl=${S3BucketBaseUrl}
      - S3BucketUser=${S3BucketUser}
      - S3BucketPassword=${S3BucketPassword}
      - S3BucketName=${S3BucketName}
      - MongoDbConnectionString=${MongoDbConnectionString}
      - KafkaConnectionString=${KafkaConnectionString}
      - KafkaProduceTopicName=${KafkaProduceTopicName}
      - AppName=${AppName}
      - AWS_REGION=${AWS_REGION}
      - AWS_CLIENT_ID=${AWS_CLIENT_ID}
      - AWS_CLIENT_SECRET=${AWS_CLIENT_SECRET}
      - AWS_USER_POOL_ID=${AWS_USER_POOL_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}      
    depends_on:
      - kafka-videoframe
      - mongodb-videoframe
      # - minio-videoframe
    networks:
      - videoframe-api-network
  kafka-videoframe:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-videoframe
    hostname: kafka
    ports:
      - "9092:9092"
    environment:

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-videoframe:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - videoframe-api-network

  kafka-ui-videoframe:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-videoframe
    depends_on:
      - kafka-videoframe
    ports:
      - "8083:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-videoframe:29092
    networks:
      - videoframe-api-network
  
  mongodb-videoframe:
    image: mongo:7.0
    container_name: mongodb-videoframe
    restart: unless-stopped

    ports:
      - "27017:27017"

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MongoDbUserName}
      - MONGO_INITDB_ROOT_PASSWORD=${MongoDbPassword}
      - MONGO_INITDB_DATABASE=${MongoDbDatabase}

    volumes:
      - mongo_data_videoframe:/data/db
    networks:
      - videoframe-api-network

  # minio-videoframe:
  #   image: minio/minio
  #   container_name: minio-videoframe
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     - MINIO_ROOT_USER=${S3BucketUser}
  #     - MINIO_ROOT_PASSWORD=${S3BucketPassword}
  #   command: server /data --console-address ":9001"
  #   networks:
  #     - videoframe-api-network

volumes:
  mongo_data_videoframe:

networks:
  videoframe-api-network:
    external: true
    name: videoframe-network